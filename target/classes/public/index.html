<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Cadastro de Produtos</h1>
        <section class="card">
            <form id="product-form">
                <div class="field-group">
                    <label for="name">Nome do produto</label>
                    <input type="text" id="name" name="name" required placeholder="Ex: Caneta azul">
                </div>
                <div class="field-group">
                    <label for="price">Preço</label>
                    <input type="number" step="0.01" id="price" name="price" required placeholder="Ex: 10.50">
                </div>
                <div class="field-group">
                    <label for="quantity">Quantidade</label>
                    <input type="number" id="quantity" name="quantity" required placeholder="Ex: 20">
                </div>
                <button type="submit">Cadastrar</button>
            </form>
            <div id="message" class="message"></div>
        </section>

        <section class="card">
            <h2>Produtos cadastrados</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th>Quantidade</th>
                    </tr>
                </thead>
                <tbody id="product-table-body">
                    <tr><td colspan="4">Carregando...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <script>
        const form = document.getElementById('product-form');
        const message = document.getElementById('message');
        const tableBody = document.getElementById('product-table-body');

        async function loadProducts() {
            const response = await fetch('/api/products');
            const products = await response.json();
            if (!Array.isArray(products)) {
                tableBody.innerHTML = '<tr><td colspan="4">Erro ao carregar produtos.</td></tr>';
                return;
            }
            if (products.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4">Nenhum produto cadastrado.</td></tr>';
                return;
            }
            tableBody.innerHTML = products.map(product => `
                <tr>
                    <td>${product.id}</td>
                    <td>${product.name}</td>
                    <td>R$ ${product.price.toFixed(2)}</td>
                    <td>${product.quantity}</td>
                </tr>
            `).join('');
        }

        async function submitForm(event) {
            event.preventDefault();
            message.textContent = '';

            const formData = new FormData(form);
            const payload = new URLSearchParams(formData);

            const response = await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: payload
            });

            const data = await response.json();
            if (!response.ok) {
                message.textContent = data.error || 'Erro ao cadastrar produto.';
                message.className = 'message error';
                return;
            }

            form.reset();
            message.textContent = 'Produto cadastrado com sucesso!';
            message.className = 'message success';
            loadProducts();
        }

        form.addEventListener('submit', submitForm);
        window.addEventListener('load', loadProducts);
    </script>
</body>
</html>
